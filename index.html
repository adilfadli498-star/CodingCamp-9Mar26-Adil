<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A lightweight productivity dashboard with timer, tasks, and quick links">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard">
        <header class="dashboard-header">
            <button class="btn" onclick="toggleTheme()">Dark/Light Mode</button>
            <input type="text" name="" id="" value="Adil Fadli" oninput="rubahNama(this.value)">
            <h1>Productivity Dashboard</h1>
        </header>

        <div class="widgets-container">
            <!-- Greeting Widget -->
            <section id="greeting-widget" class="widget">
                <div class="date-display"></div>
                <div class="time-display"></div>
                <p>Hello <span id="name"></span></p>
                <div class="greeting-message"></div>
            </section>

            <!-- Focus Timer -->
            <section id="focus-timer" class="widget">
                <h2>Focus Timer</h2>
                <div class="timer-display" role="timer" aria-live="polite" aria-atomic="true">25:00</div>
                <div class="timer-controls">
                    <button id="timer-start" class="btn btn-primary" aria-label="Start timer">Start</button>
                    <button id="timer-stop" class="btn btn-secondary" aria-label="Stop timer">Stop</button>
                    <button id="timer-reset" class="btn btn-secondary" aria-label="Reset timer">Reset</button>
                </div>
                <div class="timer-status" role="status" aria-live="polite"></div>
            </section>

            <!-- To-Do List -->
            <section id="todo-list" class="widget">
                <h2>Task</h2>
                <form class="todo-form">
                    <input type="text" id="todo-input" placeholder="Add a new task..." maxlength="500" required aria-label="New task description">
                    <button type="submit" class="btn btn-primary" aria-label="Add task">Add</button>
                </form>
                <ul class="todo-items" role="list"></ul>
                <div class="empty-state">No tasks yet. Add one above!</div>
            </section>

            <!-- Quick Links -->
            <section id="quick-links" class="widget">
                <h2>Quick Links</h2>
                <form class="links-form">
                    <input type="text" id="link-name" placeholder="Link name..." maxlength="100" required aria-label="Link name">
                    <input type="url" id="link-url" placeholder="https://..." required aria-label="Link URL">
                    <button type="submit" class="btn btn-primary" aria-label="Add link">Add</button>
                </form>
                <ul class="link-items" role="list"></ul>
                <div class="empty-state">No links yet. Add one above!</div>
            </section>
        </div>
    </main>

    <div id="error-message" class="error-banner" style="display: none;"></div>

    <script src="js/app.js"></script>
    <script src="js/theme-manager.js"></script>
</body>
</html>
