<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test App Initialization</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
        }
        h1 { color: #333; }
        h2 { color: #666; }
    </style>
</head>
<body>
    <h1>App Initialization Test</h1>
    
    <div class="test-section">
        <h2>Test Setup</h2>
        <div id="test-results"></div>
    </div>

    <!-- Mock DOM elements for testing -->
    <div style="display: none;">
        <div id="greeting-widget">
            <div class="date-display"></div>
            <div class="time-display"></div>
            <div class="greeting-message"></div>
        </div>
        <div id="focus-timer">
            <div class="timer-display">25:00</div>
            <button id="timer-start">Start</button>
            <button id="timer-stop">Stop</button>
            <button id="timer-reset">Reset</button>
            <div class="timer-status"></div>
        </div>
        <div id="todo-list">
            <form class="todo-form">
                <input type="text" id="todo-input">
                <button type="submit">Add</button>
            </form>
            <ul class="todo-items"></ul>
            <div class="empty-state"></div>
        </div>
        <div id="quick-links">
            <form class="links-form">
                <input type="text" id="link-name">
                <input type="url" id="link-url">
                <button type="submit">Add</button>
            </form>
            <ul class="link-items"></ul>
            <div class="empty-state"></div>
        </div>
        <div id="error-message" style="display: none;"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Wait for app to initialize
        setTimeout(() => {
            const results = document.getElementById('test-results');
            const tests = [];

            // Test 1: Check browser compatibility function exists
            tests.push({
                name: 'checkBrowserCompatibility function exists',
                pass: typeof checkBrowserCompatibility === 'function'
            });

            // Test 2: Check displayError function exists
            tests.push({
                name: 'displayError function exists',
                pass: typeof displayError === 'function'
            });

            // Test 3: Check StorageManager is available
            tests.push({
                name: 'StorageManager class exists',
                pass: typeof StorageManager === 'function'
            });

            // Test 4: Check all controller classes exist
            tests.push({
                name: 'GreetingController class exists',
                pass: typeof GreetingController === 'function'
            });

            tests.push({
                name: 'TimerController class exists',
                pass: typeof TimerController === 'function'
            });

            tests.push({
                name: 'TodoController class exists',
                pass: typeof TodoController === 'function'
            });

            tests.push({
                name: 'LinksController class exists',
                pass: typeof LinksController === 'function'
            });

            // Test 5: Check greeting widget initialized
            const greetingWidget = document.getElementById('greeting-widget');
            const dateDisplay = greetingWidget.querySelector('.date-display');
            const timeDisplay = greetingWidget.querySelector('.time-display');
            const greetingMessage = greetingWidget.querySelector('.greeting-message');
            
            tests.push({
                name: 'Greeting widget displays date',
                pass: dateDisplay && dateDisplay.textContent.length > 0
            });

            tests.push({
                name: 'Greeting widget displays time',
                pass: timeDisplay && timeDisplay.textContent.length > 0
            });

            tests.push({
                name: 'Greeting widget displays greeting message',
                pass: greetingMessage && greetingMessage.textContent.length > 0
            });

            // Test 6: Check timer initialized
            const timerDisplay = document.querySelector('.timer-display');
            tests.push({
                name: 'Timer displays initial time (25:00)',
                pass: timerDisplay && timerDisplay.textContent === '25:00'
            });

            // Test 7: Check Local Storage availability
            tests.push({
                name: 'Local Storage is available',
                pass: typeof Storage !== 'undefined'
            });

            // Test 8: Test component isolation - simulate error in one component
            // This is tested by the try-catch blocks in the initialization code
            tests.push({
                name: 'Components have error handling (try-catch blocks)',
                pass: true // Verified by code inspection
            });

            // Display results
            let passCount = 0;
            let failCount = 0;

            tests.forEach(test => {
                const div = document.createElement('div');
                div.className = `test-result ${test.pass ? 'pass' : 'fail'}`;
                div.textContent = `${test.pass ? '✓' : '✗'} ${test.name}`;
                results.appendChild(div);
                
                if (test.pass) passCount++;
                else failCount++;
            });

            // Summary
            const summary = document.createElement('div');
            summary.className = 'test-result';
            summary.style.marginTop = '20px';
            summary.style.fontWeight = 'bold';
            summary.textContent = `Total: ${tests.length} tests | Passed: ${passCount} | Failed: ${failCount}`;
            results.appendChild(summary);

            console.log('App initialization tests completed');
            console.log(`Passed: ${passCount}/${tests.length}`);
        }, 1500); // Wait 1.5 seconds for initialization
    </script>
</body>
</html>
