<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Integration Test - Productivity Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f5f7fa;
        }
        h1 {
            color: #4a90e2;
            margin-bottom: 2rem;
        }
        .test-section {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .test-result {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 4px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .summary {
            font-size: 1.25rem;
            font-weight: bold;
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 8px;
        }
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <h1>Final Integration Test - Productivity Dashboard</h1>
    <button onclick="runAllTests()">Run All Tests</button>
    <div id="test-results"></div>

    <script src="js/app.js"></script>
    <script>
        const results = [];

        function logResult(testName, passed, message = '') {
            results.push({ testName, passed, message });
            const resultsDiv = document.getElementById('test-results');
            const testDiv = document.createElement('div');
            testDiv.className = `test-result ${passed ? 'pass' : 'fail'}`;
            testDiv.textContent = `${passed ? '✓' : '✗'} ${testName}${message ? ': ' + message : ''}`;
            resultsDiv.appendChild(testDiv);
        }

        function runAllTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '';
            results.length = 0;

            // Test 1: Utility Functions
            testUtilityFunctions();

            // Test 2: StorageManager
            testStorageManager();

            // Test 3: GreetingController
            testGreetingController();

            // Test 4: TimerController
            testTimerController();

            // Test 5: TodoController
            testTodoController();

            // Test 6: LinksController
            testLinksController();

            // Test 7: Integration
            testIntegration();

            // Display summary
            displaySummary();
        }

        function testUtilityFunctions() {
            const section = createSection('Utility Functions');

            // Test formatTime
            try {
                const date = new Date('2024-01-01T15:30:45');
                const time = formatTime(date);
                logResult('formatTime', time === '15:30:45', `Expected "15:30:45", got "${time}"`);
            } catch (e) {
                logResult('formatTime', false, e.message);
            }

            // Test formatDate
            try {
                const date = new Date('2024-01-01T15:30:45');
                const formatted = formatDate(date);
                const hasDay = formatted.includes('Monday');
                const hasMonth = formatted.includes('January');
                const hasYear = formatted.includes('2024');
                logResult('formatDate', hasDay && hasMonth && hasYear, `Got "${formatted}"`);
            } catch (e) {
                logResult('formatDate', false, e.message);
            }

            // Test getGreeting
            try {
                logResult('getGreeting (Morning)', getGreeting(8) === 'Good Morning');
                logResult('getGreeting (Afternoon)', getGreeting(14) === 'Good Afternoon');
                logResult('getGreeting (Evening)', getGreeting(18) === 'Good Evening');
                logResult('getGreeting (Night)', getGreeting(22) === 'Good Night');
            } catch (e) {
                logResult('getGreeting', false, e.message);
            }

            // Test generateId
            try {
                const id1 = generateId();
                const id2 = generateId();
                logResult('generateId (unique)', id1 !== id2 && id1.length > 0);
            } catch (e) {
                logResult('generateId', false, e.message);
            }

            // Test validateUrl
            try {
                logResult('validateUrl (valid https)', validateUrl('https://example.com') === true);
                logResult('validateUrl (valid http)', validateUrl('http://example.com') === true);
                logResult('validateUrl (invalid)', validateUrl('javascript:alert(1)') === false);
                logResult('validateUrl (no protocol)', validateUrl('example.com') === false);
            } catch (e) {
                logResult('validateUrl', false, e.message);
            }

            // Test sanitizeUrl
            try {
                logResult('sanitizeUrl (valid)', sanitizeUrl('https://example.com') === 'https://example.com/');
                logResult('sanitizeUrl (invalid)', sanitizeUrl('javascript:alert(1)') === null);
                logResult('sanitizeUrl (empty)', sanitizeUrl('') === null);
            } catch (e) {
                logResult('sanitizeUrl', false, e.message);
            }
        }

        function testStorageManager() {
            const section = createSection('StorageManager');
            const storage = new StorageManager();

            // Test isAvailable
            try {
                logResult('StorageManager.isAvailable', storage.isAvailable() === true);
            } catch (e) {
                logResult('StorageManager.isAvailable', false, e.message);
            }

            // Test save and load
            try {
                const testData = { test: 'data', number: 123 };
                const saved = storage.save('test-key', testData);
                const loaded = storage.load('test-key');
                logResult('StorageManager.save', saved === true);
                logResult('StorageManager.load', JSON.stringify(loaded) === JSON.stringify(testData));
            } catch (e) {
                logResult('StorageManager.save/load', false, e.message);
            }

            // Test remove
            try {
                storage.save('test-remove', 'data');
                const removed = storage.remove('test-remove');
                const loaded = storage.load('test-remove');
                logResult('StorageManager.remove', removed === true && loaded === null);
            } catch (e) {
                logResult('StorageManager.remove', false, e.message);
            }

            // Cleanup
            storage.remove('test-key');
        }

        function testGreetingController() {
            const section = createSection('GreetingController');

            try {
                // Create test container
                const container = document.createElement('div');
                container.innerHTML = `
                    <div class="date-display"></div>
                    <div class="time-display"></div>
                    <div class="greeting-message"></div>
                `;
                document.body.appendChild(container);

                const controller = new GreetingController(container);
                controller.init();

                // Check if displays are populated
                const dateDisplay = container.querySelector('.date-display');
                const timeDisplay = container.querySelector('.time-display');
                const greetingMessage = container.querySelector('.greeting-message');

                logResult('GreetingController.init', dateDisplay.textContent.length > 0);
                logResult('GreetingController date display', dateDisplay.textContent.includes(','));
                logResult('GreetingController time display', timeDisplay.textContent.includes(':'));
                logResult('GreetingController greeting', greetingMessage.textContent.startsWith('Good'));

                // Cleanup
                controller.destroy();
                container.remove();
            } catch (e) {
                logResult('GreetingController', false, e.message);
            }
        }

        function testTimerController() {
            const section = createSection('TimerController');

            try {
                // Create test container
                const container = document.createElement('div');
                container.innerHTML = `
                    <div class="timer-display">25:00</div>
                    <button id="timer-start">Start</button>
                    <button id="timer-stop">Stop</button>
                    <button id="timer-reset">Reset</button>
                    <div class="timer-status"></div>
                `;
                document.body.appendChild(container);

                const controller = new TimerController(container);
                controller.init();

                // Test initial state
                logResult('TimerController initial display', controller.display.textContent === '25:00');
                logResult('TimerController initial state', controller.isRunning === false);
                logResult('TimerController initial seconds', controller.remainingSeconds === 1500);

                // Test start
                controller.start();
                logResult('TimerController start', controller.isRunning === true);
                logResult('TimerController start button disabled', controller.startButton.disabled === true);

                // Test stop
                controller.stop();
                logResult('TimerController stop', controller.isRunning === false);
                logResult('TimerController stop button enabled', controller.startButton.disabled === false);

                // Test tick
                const beforeTick = controller.remainingSeconds;
                controller.tick();
                logResult('TimerController tick', controller.remainingSeconds === beforeTick - 1);

                // Test reset
                controller.reset();
                logResult('TimerController reset', controller.remainingSeconds === 1500);

                // Cleanup
                container.remove();
            } catch (e) {
                logResult('TimerController', false, e.message);
            }
        }

        function testTodoController() {
            const section = createSection('TodoController');

            try {
                // Create test container
                const container = document.createElement('div');
                container.innerHTML = `
                    <form class="todo-form">
                        <input type="text" id="todo-input">
                        <button type="submit">Add</button>
                    </form>
                    <ul class="todo-items"></ul>
                    <div class="empty-state"></div>
                `;
                document.body.appendChild(container);

                const storage = new StorageManager();
                storage.remove('productivity-dashboard-tasks'); // Clean slate

                const controller = new TodoController(container, storage);
                controller.init();

                // Test initial state
                logResult('TodoController initial tasks', controller.tasks.length === 0);

                // Test add task
                controller.addTask('Test task 1');
                logResult('TodoController add task', controller.tasks.length === 1);
                logResult('TodoController task text', controller.tasks[0].text === 'Test task 1');
                logResult('TodoController task completed', controller.tasks[0].completed === false);

                // Test toggle task
                const taskId = controller.tasks[0].id;
                controller.toggleTask(taskId);
                logResult('TodoController toggle task', controller.tasks[0].completed === true);

                // Test edit task
                controller.editTask(taskId, 'Updated task');
                logResult('TodoController edit task', controller.tasks[0].text === 'Updated task');

                // Test persistence
                const savedTasks = storage.load('productivity-dashboard-tasks');
                logResult('TodoController persistence', savedTasks.length === 1);

                // Test delete task
                controller.deleteTask(taskId);
                logResult('TodoController delete task', controller.tasks.length === 0);

                // Cleanup
                storage.remove('productivity-dashboard-tasks');
                container.remove();
            } catch (e) {
                logResult('TodoController', false, e.message);
            }
        }

        function testLinksController() {
            const section = createSection('LinksController');

            try {
                // Create test container
                const container = document.createElement('div');
                container.innerHTML = `
                    <form class="links-form">
                        <input type="text" id="link-name">
                        <input type="url" id="link-url">
                        <button type="submit">Add</button>
                    </form>
                    <ul class="link-items"></ul>
                    <div class="empty-state"></div>
                `;
                document.body.appendChild(container);

                const storage = new StorageManager();
                storage.remove('productivity-dashboard-links'); // Clean slate

                const controller = new LinksController(container, storage);
                controller.init();

                // Test initial state
                logResult('LinksController initial links', controller.links.length === 0);

                // Test add link
                controller.addLink('Test Link', 'https://example.com');
                logResult('LinksController add link', controller.links.length === 1);
                logResult('LinksController link name', controller.links[0].name === 'Test Link');
                logResult('LinksController link url', controller.links[0].url === 'https://example.com');

                // Test persistence
                const savedLinks = storage.load('productivity-dashboard-links');
                logResult('LinksController persistence', savedLinks.length === 1);

                // Test delete link
                const linkId = controller.links[0].id;
                controller.deleteLink(linkId);
                logResult('LinksController delete link', controller.links.length === 0);

                // Cleanup
                storage.remove('productivity-dashboard-links');
                container.remove();
            } catch (e) {
                logResult('LinksController', false, e.message);
            }
        }

        function testIntegration() {
            const section = createSection('Integration Tests');

            // Test browser compatibility check
            try {
                const compatible = checkBrowserCompatibility();
                logResult('Browser compatibility check', compatible === true);
            } catch (e) {
                logResult('Browser compatibility check', false, e.message);
            }

            // Test component isolation (one component error doesn't crash others)
            try {
                const storage = new StorageManager();
                logResult('Component isolation', storage !== null);
            } catch (e) {
                logResult('Component isolation', false, e.message);
            }

            // Test DOM elements exist
            try {
                const greetingWidget = document.getElementById('greeting-widget');
                const focusTimer = document.getElementById('focus-timer');
                const todoList = document.getElementById('todo-list');
                const quickLinks = document.getElementById('quick-links');

                // Note: These might not exist in test page, so we just check the function exists
                logResult('DOM element checks', typeof document.getElementById === 'function');
            } catch (e) {
                logResult('DOM element checks', false, e.message);
            }
        }

        function createSection(title) {
            const resultsDiv = document.getElementById('test-results');
            const section = document.createElement('div');
            section.className = 'test-section';
            section.innerHTML = `<h2>${title}</h2>`;
            resultsDiv.appendChild(section);
            return section;
        }

        function displaySummary() {
            const total = results.length;
            const passed = results.filter(r => r.passed).length;
            const failed = total - passed;

            const summaryDiv = document.createElement('div');
            summaryDiv.className = `summary ${failed === 0 ? 'pass' : 'fail'}`;
            summaryDiv.textContent = `Summary: ${passed}/${total} tests passed${failed > 0 ? `, ${failed} failed` : ''}`;

            document.getElementById('test-results').appendChild(summaryDiv);
        }
    </script>
</body>
</html>
